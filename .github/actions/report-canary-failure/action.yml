name: Report canary failure
description: >
  Open (or comment on) a single deduplicated tracking issue when a
  compatibility canary detects a break against the latest framework version.

inputs:
  orm:
    description: ORM name, used in the issue title (e.g. "Hibernate").
    required: true
  framework:
    description: Framework probed, used in the issue body (e.g. "Hibernate ORM").
    required: true
  github-token:
    description: Token with issues:write.
    required: true

runs:
  using: composite
  steps:
    - name: Open or update tracking issue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ORM: ${{ inputs.orm }}
        FRAMEWORK: ${{ inputs.framework }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail
        TITLE="[compat-canary] ${ORM} adapter breaks against latest ${FRAMEWORK}"
        BODY="The weekly compatibility canary failed building/testing the ${ORM} adapter against the latest released ${FRAMEWORK}.

        This is an early warning that an upcoming ${FRAMEWORK} version introduces a breaking change (API/class relocation, removed method, etc.) before a customer hits it. See the failing run for the exact error:

        ${RUN_URL}

        Stable releases are unaffected — the supported pinned version still builds. Resolve by updating the adapter for the new ${FRAMEWORK} version, then this issue can be closed (the canary will reopen it if the break recurs)."

        # Dedup by exact title among open compat-canary issues. Scoping by label
        # (rather than by --search) avoids GitHub's title tokenization stripping
        # the `[compat-canary]` brackets and silently missing the existing issue.
        EXISTING=$(gh issue list --state open --label compat-canary --json number,title \
          --jq '.[] | select(.title == env.TITLE) | .number' | head -n1)

        if [ -n "${EXISTING}" ]; then
          gh issue comment "${EXISTING}" --body "Canary failed again: ${RUN_URL}"
          echo "Commented on existing issue #${EXISTING}"
        else
          gh label create compat-canary --color B60205 \
            --description "Adapter breaks against an upcoming framework version" 2>/dev/null || true
          gh issue create --title "${TITLE}" --body "${BODY}" --label compat-canary
          echo "Opened new tracking issue"
        fi
