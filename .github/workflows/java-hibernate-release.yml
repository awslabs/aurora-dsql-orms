name: Deploy Hibernate to Maven Central

permissions: {}

on:
  push:
    tags:
      - "java/hibernate/v*"

defaults:
  run:
    working-directory: java/hibernate/dialect

jobs:
  wait-for-ci:
    name: Wait for CI to pass
    runs-on: ubuntu-latest
    steps:
      - uses: lewagon/wait-on-check-action@v1.8.1
        with:
          ref: ${{ github.sha }}
          # Gate only on this module's CI checks. The repo is a monorepo, so the
          # release commit also carries unrelated checks (other ORMs, Dependabot)
          # that must not block — or fail — the Hibernate publish.
          check-regexp: "^(Build Dialect|Build Sample|Test Dialect|Test Sample|(create|delete)-cluster).*"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

  deploy:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    environment: maven
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "corretto"

      - name: Deploy to Central Portal
        run: |
          ./gradlew build
          ./gradlew publish
          ./gradlew jreleaserDeploy
        env:
          JRELEASER_MAVENCENTRAL_STAGE: "UPLOAD"
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

  update-changelog:
    needs: deploy
    uses: ./.github/workflows/update-changelog.yml
    with:
      tag: ${{ github.ref_name }}
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
